<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Digital World Corporate — Homepage Directions</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="shared/tokens.css"/>
<style>
  html, body { background: #f0eee9; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared/shared.jsx"></script>
<script type="text/babel" src="directions/direction-a.jsx"></script>
<script type="text/babel" src="directions/direction-b.jsx"></script>
<script type="text/babel" src="directions/direction-c.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState } = React;

// Artboards render their direction at ~full website width; design_canvas lets
// user click the "expand" icon on any artboard to open it fullscreen.
const ARTBOARD_W = 1440;
const ARTBOARD_H = 3600;

function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="homepage"
        title="Homepage — three directions"
        subtitle="Click any artboard's ↗ icon (top-right) to open full-screen. Same content, three tones."
      >
        <DCArtboard id="a" label="A · Editorial Corporate (quiet confidence)" width={ARTBOARD_W} height={ARTBOARD_H}>
          <DirectionA/>
        </DCArtboard>
        <DCArtboard id="b" label="B · Dark Premium (enterprise signal)" width={ARTBOARD_W} height={ARTBOARD_H}>
          <DirectionB/>
        </DCArtboard>
        <DCArtboard id="c" label="C · Warm Editorial (magazine tone)" width={ARTBOARD_W} height={ARTBOARD_H}>
          <DirectionC/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
